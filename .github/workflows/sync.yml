name: Sync Matches Hourly

on:
  schedule:
    # Runs at minute 0 past every hour
    - cron: '0 * * * *'
  workflow_dispatch: # Allows you to trigger it manually from GitHub

jobs:
  sync-scores:
    runs-on: ubuntu-latest

    steps:
      - name: Call Sync API
        # Replace the URL below with your actual Vercel project URL
        run: |
          curl -X GET "${{ secrets.VERCEL_PROJECT_URL }}/api/cron/sync-matches" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
